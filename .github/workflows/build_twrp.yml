---
name: Build TWRP
# yamllint disable rule:truthy

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache bc bison flex libssl-dev \
            libncurses5-dev lzop zip cpio fakeroot gcc-aarch64-linux-gnu

      - name: Prepare Android toolchain
        run: |
          TOOLCHAIN=$PWD/Toolchain/aarch64-linux-android-4.9/bin
          mkdir -p "$TOOLCHAIN"
          for b in \
            addr2line ar as c++filt cpp dwp elfedit gcc g++ gcov gcov-dump \
            gcov-tool gprof ld ld.bfd ld.gold lto-dump nm objcopy objdump \
            ranlib readelf size strings strip; do
            if command -v aarch64-linux-gnu-$b >/dev/null 2>&1; then
              src=$(command -v aarch64-linux-gnu-$b)
              ln -sf "$src" "$TOOLCHAIN/aarch64-linux-android-$b"
            fi
          done

      - name: Build kernel and recovery
        run: |
          cd build_twrp
          ln -sf compile_recovery.sh build_recovery.sh
          ./build_kernel.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twrp-build
          path: |
            ManhIT_TWRP-3.0.0-1_SC-05G.*
            recovery.img
