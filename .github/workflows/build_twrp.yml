---
name: Build TWRP

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache bc bison flex libssl-dev \
            libncurses5-dev lzop zip cpio fakeroot

      - name: Download and Extract Android GCC 4.9 Toolchain (official)
        run: |
          mkdir -p Toolchain
          cd Toolchain
          wget https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/a7bb6f39cd99b2fb26ecc2d3cb984d18cd259d24/aarch64-linux-android.tar.gz -O aarch64-linux-android.tar.gz
          tar -xzf aarch64-linux-android.tar.gz
          mv aarch64-linux-android aarch64-linux-android-4.9
          cd ..

      - name: Make build_kernel.sh executable
        run: chmod +x build_twrp/build_kernel.sh

      - name: Build kernel and recovery
        run: |
          cd build_twrp
          ln -sf compile_recovery.sh build_recovery.sh
          ./build_kernel.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twrp-build
          path: |
            ManhIT_TWRP-3.0.0-1_SC-05G.*
            recovery.img
